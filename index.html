<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monarch Training System</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background music -->
    <audio id="bgm" src="sources/solo.mp3" loop></audio>
    <audio id="clickSound" src="sources/click sound.wav"></audio>
    <audio id="levelUpSound" src="sources/levelup.mp3"></audio>

    <div id="sound-controls">
        <button id="toggleBGM">🔊 BGM</button>
        <button id="toggleSFX">🎧 SFX</button>
    </div>

    <header>
        <h1 class="title">MONARCH TRAINING SYSTEM</h1>
        <p class="subtitle">Rise and level up every day.</p>
    </header>

    <!-- Avatar Section -->
    <section id="avatar-section">
        <img id="current-avatar" src="sources/male-avatar.png" alt="avatar" />
        <button id="switch-avatar">Switch Avatar</button>
    </section>

    <!-- Daily Quest Section -->
    <section id="quests">
        <h2>Daily Quests</h2>
        <ul id="quest-list"></ul>
        <button id="reset-quests">Reset Daily Quests</button>
        <p id="xp-display">XP: 0</p>
    </section>

    <!-- Exercise Library -->
    <section id="exercise-section">
        <h2>Training Library</h2>
        <p class="section-hint">Choose muscle group</p>

        <select id="muscle-select">
            <option value="chest">Chest</option>
            <option value="back">Back</option>
            <option value="legs">Legs</option>
            <option value="shoulders">Shoulders</option>
            <option value="arms">Arms</option>
            <option value="waist">Abs</option>
        </select>

        <div id="exercise-container"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
